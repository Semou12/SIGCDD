{% block javascript %}
<script type="text/javascript">
      $(function () {

      let ePoste =$("#id_poste");
      let eService =$("#id_code_service");
      let eSecteur =$("#id_secteur");
      let eAgence =$("#id_agence");

      generateAccountNumber( ePoste,eService,eSecteur,eAgence) ;
      eSecteur.change(function (){generateAccountNumber( ePoste,eService,eSecteur,eAgence) ;});
      eAgence.change(function (){generateAccountNumber( ePoste,eService,eSecteur,eAgence) ;});
      eService.change(function (){generateAccountNumber( ePoste,eService,eSecteur,eAgence) ;});
      ePoste.change(function (){generateAccountNumber( ePoste,eService,eSecteur,eAgence) ;});


      if($('.iban-inputmask').length > 0){
            $('.iban-inputmask').inputmask("AA999 99999 999999999999 99");
       }


                let eZone =$("#id_ministere");
                let eAsc =$("#id_direction");
                eAsc.empty();
                eZone.change(function (){loadirections(eZone,eAsc);});





      $('.singledate').pickadate(
           {formatSubmit: 'mm/dd/yyyy',format: 'dd/mm/yyyy'}
      );



           $('.datetimepicker').datetimepicker({format: 'MM/DD/YYYY HH:mm:ss'});
           $(".select2").select2({
            dropdownAutoWidth: true,
                width: '100%'
            });

            $('.stackdaterangepicker').daterangepicker({

		locale: {
			format: 'DD/MM/YYYY'
		}
	});


	$('.linkeddate').each(function(){
	console.log(this.id);
	let elt_id = this.id;
	let s = elt_id.slice(-1);
	if (s=="0"){

	let lower = '#'+elt_id.slice(0, -1) + '0';
	 let upper = '#'+elt_id.slice(0, -1) + '1';
	// Date Range from & to
	var from_$input = $(lower).pickadate({formatSubmit: 'dd/mm/yyyy',format: 'dd/mm/yyyy'}),
	from_picker = from_$input.pickadate('picker');

	var to_$input = $(upper).pickadate({formatSubmit: 'dd/mm/yyyy',format: 'dd/mm/yyyy'}),
	to_picker = to_$input.pickadate('picker');


	// Check if there’s a “from” or “to” date to start with.
	if ( from_picker.get('value') ) {
		to_picker.set('min', from_picker.get('select'));
	}
	if ( to_picker.get('value') ) {
		from_picker.set('max', to_picker.get('select'));
	}

	// When something is selected, update the “from” and “to” limits.
	from_picker.on('set', function(event) {
		if ( event.select ) {
			to_picker.set('min', from_picker.get('select'));
		}
		else if ( 'clear' in event ) {
			to_picker.set('min', false);
		}
	});
	to_picker.on('set', function(event) {
		if ( event.select ) {
			from_picker.set('max', to_picker.get('select'));
		}
		else if ( 'clear' in event ) {
			from_picker.set('max', false);
		}
	});


	}




	console.log(s);
});

      });
  </script>



<script>
  var input = document.querySelector("#id_phone"),
  errorMsg = document.querySelector("#error-msg"),
  validMsg = document.querySelector("#valid-msg");

 var errorMap = ["Invalid number", "Invalid country code", "Too short", "Too long", "Invalid number"];

// initialise plugin
var iti = window.intlTelInput(input, {
initialCountry:"sn",
  onlyCountries: ["sn" ],
  utilsScript: "{% static 'telinput/build/js/utils.js' %}"
});

var reset = function(inputVar,errorVar,validVar) {
  inputVar.classList.remove("error");
  errorVar.innerHTML = "";
  errorVar.classList.add("hide");
  validVar.classList.add("hide");
};

// on blur: validate
input.addEventListener('blur', function() {

 reset(input,errorMsg,validMsg);
  if (input.value.trim()) {
    if (iti.isValidNumber()) {
      validMsg.classList.remove("hide");
    } else {
      input.classList.add("error");
      var errorCode = iti.getValidationError();
      errorMsg.innerHTML = errorMap[errorCode];
      errorMsg.classList.remove("hide");
    }
  }
});

// on keyup / change flag: reset
input.addEventListener('change', reset);
input.addEventListener('keyup', reset);







  </script>

<script>
 function loadirections( elZone, elAsc) {
        let odval = elZone.val();
        console.log(odval);
        if (!odval )
        {return false;}

        $.ajax({
            type: 'GET',
            url: "{% url 'core:load_directions_by_ministere' %}",
            data: {"id":odval},
            success: function (response) {
                console.log(response);
                ascs= response['directions'];
                elAsc.empty();
                for(let i = 0; i < ascs.length; i++){
                    let zone = ascs[i];
                   elAsc.append($('<option>').val(zone["id"]).text(zone["name"]));
              }
            },
            error: function (response) {
                console.log(response);
            }
        });

  }














   function generateAccountNumber( ePoste,eService,eSecteur,eAgence) {
        let poste = ePoste.val();
         let secteur = eService.val();
          let service = eSecteur.val();
           let agence = eAgence.val();

        if (!service || !poste || !secteur || !agence )
        {return false;}

        $.ajax({
            type: 'GET',
            url: "{% url 'cddaccount:ajax_generate_account_number' %}",
            data: {"poste":poste,"agence":agence,"secteur":secteur,"service":service},
            success: function (response) {
                console.log(response);
                num_compte = response['compte'];
                $('#id_compte').val(num_compte);




            },
            error: function (response) {
                console.log(response);
            }
        });

  }


</script>

{% endblock javascript %}
