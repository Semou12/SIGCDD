<form method="post" action=""  enctype="multipart/form-data">
  {% csrf_token %}

  <div class="modal-header">
    <h3 class="modal-title">{{title}}</h3>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>

  <div class="modal-body">

    <div class="{% if form.non_field_errors %}invalid{% endif %} mb-2">
      {% for error in form.non_field_errors %}
        {{ error }}
      {% endfor %}
    </div>

  </div>

  <div class="modal-footer">
    <button type="submit" class="btn btn-primary">Valider</button>
  </div>

</form>
{% block javascript %}
<script type="text/javascript">
      $(function () {
      let eMPamean =$("#id_payment_mean");
      let elshow =$("#id_receptionnaire");

     elshow.change(function() {
	  showHideReceptionnaireFields(elshow);
      });


      showHideReceptionnaireFields(elshow);
      showHideChequeField(eMPamean);

      eMPamean.change(function (){showHideChequeField(eMPamean);});

      if ( $( "#id_compte" ).length ){
      let eCompte =$("#id_compte");
      let eNature =$("#id_type_nature");
      eCompte.change(function (){loadAccountInfos(eCompte,eNature);});
      }
      $('.singledate').pickadate(
           {
		    selectMonths: true,
		    selectYears: true,
           formatSubmit: 'mm/dd/yyyy',format: 'dd/mm/yyyy'
           }
      );



           $('.datetimepicker').datetimepicker({format: 'MM/DD/YYYY HH:mm:ss'});
           $(".select2").select2({
            dropdownAutoWidth: true,
                width: '100%'
            });

            $('.stackdaterangepicker').daterangepicker({

		locale: {
			format: 'DD/MM/YYYY'
		}
	});


	$('.linkeddate').each(function(){
	console.log(this.id);
	let elt_id = this.id;
	let s = elt_id.slice(-1);
	if (s=="0"){

	let lower = '#'+elt_id.slice(0, -1) + '0';
	 let upper = '#'+elt_id.slice(0, -1) + '1';
	// Date Range from & to
	var from_$input = $(lower).pickadate({formatSubmit: 'dd/mm/yyyy',format: 'dd/mm/yyyy'}),
	from_picker = from_$input.pickadate('picker');

	var to_$input = $(upper).pickadate({formatSubmit: 'dd/mm/yyyy',format: 'dd/mm/yyyy'}),
	to_picker = to_$input.pickadate('picker');


	// Check if there’s a “from” or “to” date to start with.
	if ( from_picker.get('value') ) {
		to_picker.set('min', from_picker.get('select'));
	}
	if ( to_picker.get('value') ) {
		from_picker.set('max', to_picker.get('select'));
	}

	// When something is selected, update the “from” and “to” limits.
	from_picker.on('set', function(event) {
		if ( event.select ) {
			to_picker.set('min', from_picker.get('select'));
		}
		else if ( 'clear' in event ) {
			to_picker.set('min', false);
		}
	});
	to_picker.on('set', function(event) {
		if ( event.select ) {
			from_picker.set('max', to_picker.get('select'));
		}
		else if ( 'clear' in event ) {
			from_picker.set('max', false);
		}
	});


	}




	console.log(s);
});

      });
  </script>



<script>
if ($('.iban-inputmask').length > 0){

<script>
 function loadAccountInfos( eCompte,eTypeNature) {
        let odval = eCompte.val();
        console.log(odval);
        if (!odval )
        {return false;}

        $.ajax({
            type: 'GET',
            url: "{% url 'cddaccount:load_compte_infos' %}",
            data: {"id":odval},
            success: function (response) {
                console.log(response);
                type_natures = response['infos']['type_natures'];
                 eTypeNature.empty();

                for(let i = 0; i < type_natures.length; i++){
                    let zone = type_natures[i];
                   eTypeNature.append($('<option>').val(zone["name"]).text(zone["name"]));
                }

                mandataires = response['infos']['mandataires'];
                eDepositaire= $('#id_depositaire');
                let eAMount= $('#id_amount_0')
                let balance=response['infos']['balance'];
                eAMount.attr({"max" : balance ,"placeholder":'montant max :'+balance});
                console.log(balance);
                eDepositaire.empty();
                for(let i = 0; i < mandataires.length; i++){
                    let zone = mandataires[i];
                   eDepositaire.append($('<option>').val(zone["id"]).text(zone["name"]));
                }


            },
            error: function (response) {
                console.log(response);
            }
        });

  }



   function showHideChequeField(ePmean) {
        let odval = ePmean.val();
        console.log(odval);
        if (!odval )
        {return false;}
        let label = $("label[for=id_cheque]");
        let receplabel = $("label[for=id_receptionnaire]");

        let ibanlabel = $("label[for=id_iban]");

        if (odval=="CHEQUE"){

        $('#id_cheque').show();
        $('#id_receptionnaire').show();
        $('#id_cheque').prop('required', true);

        label.show();
        receplabel.show()
        showHideReceptionnaireFields($('#id_receptionnaire'))


         $('#id_iban').show();
         $('#id_iban').val('');
         $('#id_iban').prop('required', false);
         ibanlabel.show();


        }

        else if (odval=="VIREMENT"){
         $('#id_iban').show();
         $('#id_iban').val('');
         $('#id_iban').prop('required', true);
         ibanlabel.show();


        $('#id_cheque').hide();
         $('#id_cheque').val('');
          $('#id_cheque').prop('required', false);
        $('#id_receptionnaire').hide();
        label.hide();
        receplabel.hide()
        $('#id_receptionnaire').prop('checked', true);
        showHideReceptionnaireFields($('#id_receptionnaire'))


        }


        else{

        $('#id_cheque').hide();
         $('#id_cheque').val('');
          $('#id_cheque').prop('required', false);
        $('#id_receptionnaire').hide();
        label.hide();
        receplabel.hide()
        $('#id_receptionnaire').prop('checked', true);
        showHideReceptionnaireFields($('#id_receptionnaire'))

         $('#id_iban').hide();
         $('#id_iban').val('');
         $('#id_iban').prop('required', false);
         ibanlabel.hide();
        }
  }



    function showHideReceptionnaireFields(elshow) {

        let cinlabel = $("label[for=id_cin_receptionnaire]");
        let phonelabel = $("label[for=id_phone_receptionnaire]");
        let depositairelabel = $("label[for=id_depositaire]");


        let odval = elshow.val();
        console.log(odval);
        if (odval=="GERANT" ){

           $('#id_cin_receptionnaire').hide();
          $('#id_phone_receptionnaire').hide();
          phonelabel.hide();
          cinlabel.hide();
          $('#id_cin_receptionnaire').prop('required', false);
          $('#id_phone_receptionnaire').prop('required', false);

          depositairelabel.hide();
          $('#id_depositaire').hide();

        }
        else if  (odval=="BENEFICIAIRE" ){
         cinlabel.show();
          phonelabel.show();
          $('#id_cin_receptionnaire').show();
          $('#id_phone_receptionnaire').show();
          $('#id_cin_receptionnaire').prop('required', true);
          $('#id_phone_receptionnaire').prop('required', true);
           depositairelabel.hide();
           $('#id_depositaire').hide();
        }

        else{

        $('#id_cin_receptionnaire').hide();
        $('#id_phone_receptionnaire').hide();
        phonelabel.hide();
        cinlabel.hide();
        $('#id_cin_receptionnaire').prop('required', false);
        $('#id_phone_receptionnaire').prop('required', false);
         depositairelabel.show();
          $('#id_depositaire').show();
        }





  }
</script>



{% endblock javascript %}
