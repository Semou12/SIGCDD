upstream sigccd_web {
    server web:8000; # web name to use in services dockercompose
}

server {

    listen 8080;

    location / {
        proxy_pass http://sigccd_web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

}