 <!-- Modal -->
                                                    <div class="modal fade text-left" id="default" tabindex="-1" role="dialog" aria-labelledby="myModalLabel1" aria-hidden="true">
                                                        <div class="modal-dialog" role="document">
                                                            <div class="modal-content">
                                                                 <form method="post" action="{% url 'cddaccount:switch_contexte' %}" >
                                                                <div class="modal-header">
                                                                    <h4 class="modal-title" id="myModalLabel1">Changer journée Comptable</h4>
                                                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                                        <span aria-hidden="true">&times;</span>
                                                                    </button>
                                                                </div>
                                                                <div class="modal-body">
                                                                    <h5>Changer de contexte</h5>

              {% csrf_token %}

                    <div class="input-group">

                        <input type="date" name="jour" id="id_jour"
           placeholder="Jour comptable" class="form-control singledate"   required>

        <div class="input-group-append"><span class="input-group-text"><i
                class="feather icon-calendar"></i></span>
        </div>


    </div>


 </div>
                                                                <div class="modal-footer">
                                                                    <button type="submit"
                                                                            class="btn btn-outline-primary">Valider
                                                                    </button>
                                                                </div>

                                                                      </form>
                                                            </div>
                                                        </div>
                                                    </div>





 <script type="text/javascript">
      $(function () {

      $('.singledate').pickadate(
           {
		    selectMonths: true,
		    selectYears: true,
           formatSubmit: 'mm/dd/yyyy',format: 'dd/mm/yyyy'
           }
      );
      });
  </script>
