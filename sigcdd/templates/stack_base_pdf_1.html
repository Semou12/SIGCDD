<!DOCTYPE html>
{% load static i18n helpers_tags %}

<html class="loading" lang="en" data-textdirection="ltr">
<!-- BEGIN: Head-->

<head>
    <meta http-equiv="Content-Type" content="text/pdf; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{% block title %}{{ "APP_NAME" |application_local_tag }}{% endblock title %}</title>



    <!-- END: Page CSS-->
 {% block css %} {% endblock  %}

    <style>
            @page {

                size: {{ pagesize }};

                margin: 1cm;

                @frame footer {

                    -pdf-frame-content: footerContent;

                    bottom: 0cm;

                    margin-left: 9cm;

                    margin-right: 9cm;

                    height: 1cm;

                }

                .bg-light{
                    background-color: black !important;
                    background: black;

                 }

}

    </style>

</head>
<!-- END: Head-->

<!-- BEGIN: Body-->


<body class="vertical-layout">

    <script type="text/javascript">
          window.onload = addPageNumbers;

          function addPageNumbers() {
            var totalPages = Math.ceil(document.body.scrollHeight / 1123);  //842px A4 pageheight for 72dpi, 1123px A4 pageheight for 96dpi, 
            for (var i = 1; i <= totalPages; i++) {
              var pageNumberDiv = document.createElement("div");
              var pageNumber = document.createTextNode("Page " + i + " of " + totalPages);
              pageNumberDiv.style.position = "absolute";
              pageNumberDiv.style.top = "calc((" + i + " * (297mm - 0.5px)) - 40px)"; //297mm A4 pageheight; 0,5px unknown needed necessary correction value; additional wanted 40px margin from bottom(own element height included)
              pageNumberDiv.style.height = "10px";
              pageNumberDiv.appendChild(pageNumber);
              document.body.insertBefore(pageNumberDiv, document.getElementById("content"));
              pageNumberDiv.style.left = "calc(100% - (" + pageNumberDiv.offsetWidth + "px + 20px))";
            }
          }
        </script>
    
    <!-- BEGIN: Content-->
    <div class="app-content content">
           <div class="content-body">

              {% block content %}

              {% endblock %}

            </div>
    </div>
    <!-- END: Content-->



   






    <!-- BEGIN: Page JS-->
    <!-- END: Page JS-->
<script src="{% static 'stack/app-assets/js/core/signotify.js' %}" type="text/javascript"></script>
    {% block javascript %} {% endblock javascript %}


    <div id="footerContent">

        {%block page_foot%}

            Page <pdf:pagenumber/>

        {% endblock%}

    </div> 

</body>

<!-- END: Body-->

</html>
